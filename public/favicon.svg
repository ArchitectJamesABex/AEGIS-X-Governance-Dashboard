<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#050914"/>

  <!--
    Hammer drawn vertically (head at top, handle down), then rotated
    -38° around the canvas centre so the head lands at upper-left
    and the handle extends toward lower-right.
  -->
  <g transform="rotate(-38, 32, 32)">

    <!-- Handle: long brown stick -->
    <rect x="28.5" y="27" width="7" height="30" rx="3.5" fill="#a0522d"/>

    <!-- Head: wide rectangular striking block -->
    <rect x="15" y="14" width="34" height="13" rx="2.5" fill="#39ff14"/>

    <!-- Split claw — left prong curving away to upper-left -->
    <path d="M 21,14 C 17,11 15,8 13,6"
          stroke="#39ff14" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Split claw — right prong curving away to upper-right -->
    <path d="M 43,14 C 47,11 49,9 51,8"
          stroke="#39ff14" stroke-width="5" fill="none" stroke-linecap="round"/>

  </g>
</svg>
